<!doctype html><html><head><meta charset="utf-8"><title>Ollama Switchboard</title><style>body{font-family:sans-serif;background:#0f172a;color:#e2e8f0;max-width:860px;margin:20px auto}textarea,input,button{background:#111827;color:#e5e7eb;border:1px solid #334155;padding:8px}#out{white-space:pre-wrap;background:#020617;padding:12px;border-radius:8px;min-height:180px}</style></head><body><h1>Ollama Switchboard Chat</h1><label>Model <input id="model" value="llama3"></label><label><input id="stream" type="checkbox" checked> stream</label><br><textarea id="msg" rows="5" cols="80" placeholder="Ask something..."></textarea><br><button onclick="send()">Send</button> <button onclick="document.getElementById('out').textContent=''">Clear</button><div id="meta"></div><pre id="out"></pre><script>
const proxyBase='__PROXY_BASE__';
async function send(){
const model=document.getElementById('model').value; const stream=document.getElementById('stream').checked; const msg=document.getElementById('msg').value;
const out=document.getElementById('out'); out.textContent=''; const t0=Date.now();
const res=await fetch(proxyBase + '/api/chat',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({model,stream,messages:[{role:'user',content:msg}]})});
if(!stream){out.textContent=await res.text();}
else{
const rd=res.body.getReader(); const dec=new TextDecoder();
while(true){const {done,value}=await rd.read(); if(done) break; out.textContent += dec.decode(value,{stream:true});}
}
document.getElementById('meta').textContent=`status=${res.status} latency=${Date.now()-t0}ms`;
}
</script></body></html>
