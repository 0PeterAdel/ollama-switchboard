<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ollama Switchboard</title>
  <style>
    :root{color-scheme:dark;--bg:#0b1020;--panel:#121827;--line:#2a3448;--text:#e6edf7;--muted:#93a4b8;--accent:#43b3ae;--danger:#ef6767}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font:14px/1.45 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    main{max-width:920px;margin:0 auto;padding:24px}
    header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}
    h1{font-size:24px;margin:0;font-weight:650}
    .controls{display:grid;grid-template-columns:minmax(180px,1fr) auto auto;gap:10px;align-items:end;margin-bottom:12px}
    label{display:grid;gap:6px;color:var(--muted);font-size:12px}
    input,textarea,button{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:6px;font:inherit}
    input,textarea{padding:10px}
    textarea{width:100%;min-height:150px;resize:vertical}
    button{padding:10px 14px;cursor:pointer}
    button.primary{background:var(--accent);border-color:var(--accent);color:#031313;font-weight:650}
    button:disabled{cursor:not-allowed;opacity:.6}
    .toggle{display:flex;align-items:center;gap:8px;height:40px;color:var(--text)}
    .toggle input{width:16px;height:16px}
    .actions{display:flex;gap:10px;margin:12px 0}
    #meta{min-height:22px;color:var(--muted)}
    #meta.error{color:var(--danger)}
    #out{white-space:pre-wrap;background:#050916;border:1px solid var(--line);border-radius:8px;min-height:220px;margin:0;padding:14px;overflow:auto}
    @media (max-width:700px){main{padding:16px}.controls{grid-template-columns:1fr}.actions{position:sticky;bottom:0;background:var(--bg);padding:10px 0}}
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Ollama Switchboard</h1>
    </header>
    <section class="controls">
      <label>Model<input id="model" value="llama3" autocomplete="off"></label>
      <label class="toggle"><input id="stream" type="checkbox" checked>Stream</label>
      <button id="clear" type="button">Clear</button>
    </section>
    <textarea id="msg" placeholder="Ask something..."></textarea>
    <div class="actions">
      <button id="send" class="primary" type="button">Send</button>
    </div>
    <div id="meta"></div>
    <pre id="out"></pre>
  </main>
  <script>
    const sendButton = document.getElementById('send');
    const clearButton = document.getElementById('clear');
    const out = document.getElementById('out');
    const meta = document.getElementById('meta');

    clearButton.addEventListener('click', () => {
      out.textContent = '';
      meta.textContent = '';
      meta.className = '';
    });

    sendButton.addEventListener('click', send);

    async function send() {
      const model = document.getElementById('model').value.trim();
      const stream = document.getElementById('stream').checked;
      const content = document.getElementById('msg').value;
      const started = Date.now();
      out.textContent = '';
      meta.textContent = 'Sending...';
      meta.className = '';
      sendButton.disabled = true;
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: {'content-type': 'application/json'},
          body: JSON.stringify({model, stream, messages: [{role: 'user', content}]})
        });
        if (!stream || !res.body) {
          out.textContent = await res.text();
        } else {
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          while (true) {
            const chunk = await reader.read();
            if (chunk.done) break;
            out.textContent += decoder.decode(chunk.value, {stream: true});
          }
        }
        meta.textContent = `status=${res.status} latency=${Date.now() - started}ms`;
        meta.className = res.ok ? '' : 'error';
      } catch (err) {
        meta.textContent = err instanceof Error ? err.message : String(err);
        meta.className = 'error';
      } finally {
        sendButton.disabled = false;
      }
    }
  </script>
</body>
</html>
