name: Release
on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: |
          GOOS=linux GOARCH=amd64 go build -o dist/osb-linux-amd64 ./cmd/osb
          GOOS=linux GOARCH=arm64 go build -o dist/osb-linux-arm64 ./cmd/osb
          GOOS=darwin GOARCH=amd64 go build -o dist/osb-darwin-amd64 ./cmd/osb
          GOOS=darwin GOARCH=arm64 go build -o dist/osb-darwin-arm64 ./cmd/osb
          GOOS=windows GOARCH=amd64 go build -o dist/osb-windows-amd64.exe ./cmd/osb
